<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Expense Tracker 🌸</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- TEMP INLINE ONCLICK added for immediate navigation test (safe to keep) -->
  <button id="authBtn" class="top-left-btn" onclick="location.href='signin.html'">Sign In / Sign Up</button>

  <h1 class="title">🌸 Spend Bunny 🌸</h1>
  <h2 id="welcomeText"></h2>


  <div class="summary-container">
      <div class="summary-box spent">
          <h3>Total Spent</h3>
          <p id="totalSpent">₹0</p>
      </div>

      <div class="summary-box saved">
          <h3>Total Saved</h3>
          <p id="totalSaved">₹0</p>
      </div>
  </div>

  <div class="form">
      <input type="text" id="title" placeholder="Expense Title 🌼">
      <input type="number" id="amount" placeholder="Amount 💸">
      <input type="text" id="date" placeholder="dd/mm/yyyy" onfocus="this.type='date'" onblur="if(!this.value){this.type='text'}">
      <select id="category">
          <option value="Food">🍔 Food</option>
          <option value="Shopping">🎀 Shopping</option>
          <option value="Travel">🚗 Travel</option>
          <option value="Other">🧁 Other</option>
      </select>

      <div class="salary-box">
          <h2>💰 Monthly Budget</h2>
          <label for="salaryInput">Salary / Budget:</label>
          <input type="number" id="salaryInput" placeholder="Enter your monthly salary">
      </div>

      <button id="addBtn">Add Expense 💖</button>
  </div>

  <div id="list"></div>
  <img src="Tenor-unscreen.gif" class="cat-gif">

  <!-- IMPORTANT: load only script.js as module (it imports firebase.js) -->
  <script type="module" src="script.js"></script>
</body>
</html>
